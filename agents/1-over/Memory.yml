type: mixin
recall: true
recall_file: null  # defaults to the agent name in lower-case, in CWD; can also use abs paths like /db
recall_recent: 3
recall_limit: 3  # per query
recall_context: 3  # do searches based on each of the last 3 messages, TODO might want different limits
recall_pos: 3  # means back from bottom, 1 = above the query, 0 = below the query
recall_role: null  # means the Agent
recall_prefix: "*$NAME's memories!*"
recall_suffix: "I was just remembering that to myself, not aloud. No one else heard it yet. I may use these memories in my response now!"
recall_strip: false
summary: true
summary_prompt: "summarize what you'd like to remember from this full chat please, in full detail, including all the main people and things, but not including your self-talk or any pictures or @mentions.\n\nJust give the summary only with no prelude, in one paragraph of first person prose, from your point of view. Don't include anything you didn't know about or witness yourself!"  # defaults to settings.SUMMARY_PROMPT_DEFAULT
summary_role: null  # means no agent
remember: true
